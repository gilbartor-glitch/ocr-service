<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Juice — חשמל חכם</title>
<meta name="theme-color" content="#f59e0b"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Juice"/>
<link rel="apple-touch-icon" href="/static/icon-192.png?v=3"/>
<link rel="apple-touch-icon" sizes="180x180" href="/static/icon-180.png?v=3"/>
<link rel="manifest" href="/static/manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#fffbeb;--surface:#fff;--surface2:#fef3c7;
  --border:#fde68a;--border2:#fbbf24;
  --text:#111;--text2:#555;--text3:#92400e;
  --accent:#f59e0b;--accent-dark:#d97706;--accent-light:#fef3c7;
  --green:#16a34a;--green-light:#dcfce7;
  --red:#dc2626;--blue:#2563eb;--purple:#7c3aed;--teal:#0d9488;
  --r:20px;--r2:14px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-lg:0 10px 30px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.04);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:15px;min-height:100vh;-webkit-font-smoothing:antialiased}

nav{display:flex;align-items:center;padding:0 24px;height:56px;background:rgba(255,251,235,.9);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.logo{font-size:22px;font-weight:900;letter-spacing:-.04em;color:var(--text);display:flex;align-items:center;gap:8px}
.logo-icon{font-size:26px}
.logo span{color:var(--accent)}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:14px}
.nav-status{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text3);font-weight:500}
.nav-dot{width:6px;height:6px;border-radius:50%;background:var(--text3);transition:.3s}
.nav-dot.on{background:var(--green);box-shadow:0 0 6px var(--green)}

.container{max-width:700px;margin:0 auto;padding:32px 20px 80px}

/* UPLOAD */
.upload-zone{background:var(--surface);border:2px dashed var(--border2);border-radius:var(--r);padding:48px 24px;text-align:center;cursor:pointer;transition:all .2s;position:relative;box-shadow:var(--shadow)}
.upload-zone:hover,.upload-zone.over{border-color:var(--accent);background:var(--accent-light);border-style:solid}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.upload-icon{font-size:56px;margin-bottom:16px}
.upload-title{font-size:18px;font-weight:800;color:var(--text);margin-bottom:6px}
.upload-hint{font-size:14px;color:var(--text3)}
.upload-formats{margin-top:16px;display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
.fmt-tag{font-size:11px;font-weight:600;color:var(--text3);background:var(--surface2);padding:4px 10px;border-radius:8px}

.file-preview{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:14px 18px;margin-top:16px;box-shadow:var(--shadow)}
.file-preview-icon{font-size:26px}
.file-preview-name{font-size:14px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-preview-size{font-size:12px;color:var(--text3);font-weight:500}
.file-preview-remove{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:14px;color:var(--text3);display:flex;align-items:center;justify-content:center;transition:.15s}
.file-preview-remove:hover{background:var(--red);color:#fff;border-color:var(--red)}

.process-btn{width:100%;padding:16px;background:var(--accent);color:#fff;border:none;border-radius:var(--r2);font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;margin-top:16px;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 14px rgba(245,158,11,.3)}
.process-btn:hover{background:var(--accent-dark);transform:translateY(-1px)}
.process-btn:disabled{background:var(--border);color:var(--text3);cursor:not-allowed;transform:none;box-shadow:none}

.steps-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:28px;margin-top:28px;box-shadow:var(--shadow)}
.steps-title{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin-bottom:16px}
.step-row{display:flex;align-items:center;gap:12px;padding:12px 0;font-size:14px;font-weight:500;color:var(--text3)}
.step-row+.step-row{border-top:1px solid var(--surface2)}
.step-row.active{color:var(--text)}
.step-row.done{color:var(--green)}
.step-icon{width:24px;text-align:center;font-size:16px}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}

/* RESULTS */
.results{margin-top:28px}
.doc-title{font-size:24px;font-weight:900;color:var(--text);margin-bottom:20px;line-height:1.2;letter-spacing:-.02em}

/* BILL SUMMARY */
.bill-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:24px;margin-bottom:16px;box-shadow:var(--shadow)}
.bill-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--surface2);font-size:14px}
.bill-row:last-child{border-bottom:none}
.bill-label{color:var(--text3);font-weight:500}
.bill-value{font-weight:700;color:var(--text)}

/* SAVINGS HERO */
.savings-hero{border-radius:var(--r);padding:28px;color:#fff;position:relative;overflow:hidden;margin-bottom:16px;box-shadow:var(--shadow-lg);background:linear-gradient(135deg,#16a34a,#15803d);cursor:pointer}
.savings-hero::after{content:'';position:absolute;top:-30%;left:-10%;width:200px;height:200px;background:rgba(255,255,255,.08);border-radius:50%}
.savings-label{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;opacity:.75;margin-bottom:8px}
.savings-value{font-size:36px;font-weight:900;line-height:1.1;position:relative;z-index:1}
.savings-sub{font-size:14px;opacity:.8;margin-top:6px;font-weight:500;position:relative;z-index:1}

/* CURRENT BILL HERO */
.bill-hero{border-radius:var(--r);padding:28px;color:#fff;position:relative;overflow:hidden;margin-bottom:16px;box-shadow:var(--shadow-lg);background:linear-gradient(135deg,#dc2626,#b91c1c)}
.bill-hero::after{content:'';position:absolute;top:-30%;right:-10%;width:200px;height:200px;background:rgba(255,255,255,.08);border-radius:50%}

/* SAVINGS ITEMS */
.saving-item{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r2);padding:18px 20px;margin-bottom:10px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:.15s;box-shadow:var(--shadow)}
.saving-item:hover{border-color:var(--green);background:var(--green-light);box-shadow:var(--shadow-lg)}
.saving-icon{font-size:28px;width:48px;height:48px;border-radius:14px;background:var(--green-light);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.saving-text{flex:1}
.saving-title{font-size:15px;font-weight:700;margin-bottom:2px}
.saving-desc{font-size:12px;color:var(--text3)}
.saving-amount{text-align:left;flex-shrink:0}
.saving-nis{font-size:18px;font-weight:900;color:var(--green)}
.saving-period{font-size:11px;color:var(--text3)}

/* EFFORT BADGE */
.effort{display:inline-flex;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.effort-easy{background:#dcfce7;color:#16a34a}
.effort-medium{background:#fef3c7;color:#d97706}

/* SOLAR CARD */
.solar-card{background:linear-gradient(135deg,#2563eb,#1d4ed8);border-radius:var(--r);padding:24px;color:#fff;margin-top:16px;box-shadow:var(--shadow-lg);cursor:pointer}

.section-label{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);margin:24px 0 12px}

.reset-btn{width:100%;padding:14px;background:var(--surface);color:var(--text2);border:1.5px solid var(--border);border-radius:var(--r2);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;margin-top:20px;transition:.15s}
.reset-btn:hover{border-color:var(--text3);color:var(--text)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal{background:var(--surface);border-radius:24px 24px 0 0;width:100%;max-width:560px;max-height:85vh;overflow-y:auto;padding:8px 24px 28px;animation:slideUp .25s ease}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:8px auto 16px}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.modal-title{font-size:18px;font-weight:800}
.modal-close{width:32px;height:32px;border-radius:50%;background:var(--surface2);border:none;color:var(--text2);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:.15s}
.modal-close:hover{background:var(--border)}
.modal-body{font-size:14px;line-height:1.7;color:var(--text2)}
.detail-row{display:flex;gap:10px;padding:12px 0;border-bottom:1px solid var(--surface2);font-size:14px}
.detail-row:last-child{border-bottom:none}
.detail-key{font-weight:700;color:var(--text3);min-width:100px;flex-shrink:0;font-size:12px}
.detail-val{color:var(--text);line-height:1.5;font-weight:500}

@keyframes tileIn{from{opacity:0;transform:translateY(10px) scale(.97)}to{opacity:1;transform:none}}

@media(max-width:520px){
  .container{padding:20px 14px 60px}
  .savings-value{font-size:28px}
}
</style>
</head>
<body>
<div id="splash" style="position:fixed;inset:0;z-index:9999;background:#fffbeb;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px">
  <img src="/static/juice-logo.png" alt="Juice" style="height:48px">
  <div style="font-size:14px;color:#92400e;font-weight:500">Smart Electricity</div>
  <div style="width:24px;height:24px;border:3px solid #fde68a;border-top-color:#f59e0b;border-radius:50%;animation:spin .6s linear infinite"></div>
</div>
<script>window.addEventListener('load',function(){document.getElementById('splash').style.display='none';});</script>
<nav>
  <img src="/static/juice-logo.png" alt="Juice" style="height:32px">
  <div class="nav-right">
    <div class="nav-status"><span class="nav-dot" id="dot"></span><span id="sl">Connecting</span></div>
  </div>
</nav>

<div class="container">
  <!-- UPLOAD -->
  <div id="uploadArea">
    <div style="text-align:center;margin-bottom:24px">
      <div style="font-size:24px;font-weight:900;margin-bottom:6px">&#x1F50D; Scan your electricity bill</div>
      <div style="font-size:15px;color:var(--text3)">Upload your &#1495;&#1513;&#1489;&#1493;&#1503; &#1495;&#1513;&#1502;&#1500; and see how much you can save</div>
    </div>
    <div class="upload-zone" id="dz" ondragover="dzOver(event)" ondragleave="dzLeave()" ondrop="dzDrop(event)">
      <input type="file" id="fileIn" accept="image/*,.heic,.heif,.pdf,application/pdf" capture="environment" onchange="fileChange(event)"/>
      <div class="upload-icon">&#x1F4F8;</div>
      <div class="upload-title">Take a photo or upload your bill</div>
      <div class="upload-hint">PDF or photo of your electricity bill</div>
      <div class="upload-formats">
        <span class="fmt-tag">PDF</span><span class="fmt-tag">JPEG</span><span class="fmt-tag">PNG</span><span class="fmt-tag">HEIC</span>
      </div>
    </div>
    <div id="filePreview"></div>
    <button class="process-btn" id="runBtn" onclick="doRun()" disabled>&#x26A1; Analyze my bill</button>
  </div>

  <!-- PROCESSING -->
  <div id="stepsArea" style="display:none"></div>

  <!-- RESULTS -->
  <div id="resultsArea" style="display:none"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="closeModal(event)">
  <div class="modal" id="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <button class="modal-close" onclick="closeModal()">&#x2715;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
var selFile=null, billData=null, savingsData=null;

fetch('/health').then(function(r){if(r.ok){document.getElementById('dot').className='nav-dot on';document.getElementById('sl').textContent='Online';}}).catch(function(){});

/* --- Upload --- */
function fileChange(e){selFile=e.target.files[0]||null;renderPreview();}
function dzOver(e){e.preventDefault();document.getElementById('dz').classList.add('over');}
function dzLeave(){document.getElementById('dz').classList.remove('over');}
function dzDrop(e){
  e.preventDefault();document.getElementById('dz').classList.remove('over');
  var f=Array.from(e.dataTransfer.files).find(function(f){return f.type.indexOf('image/')===0||f.type==='application/pdf'||f.name.toLowerCase().endsWith('.pdf');});
  if(f){selFile=f;renderPreview();}
}
function renderPreview(){
  var el=document.getElementById('filePreview');
  if(!selFile){el.innerHTML='';document.getElementById('runBtn').disabled=true;return;}
  var size=selFile.size>1024*1024?(selFile.size/1024/1024).toFixed(1)+' MB':(selFile.size/1024).toFixed(0)+' KB';
  el.innerHTML='<div class="file-preview"><div class="file-preview-icon">&#x1F4C4;</div><div class="file-preview-name">'+esc(selFile.name)+'</div><div class="file-preview-size">'+size+'</div><button class="file-preview-remove" onclick="removeFile()">&#x2715;</button></div>';
  document.getElementById('runBtn').disabled=false;
}
function removeFile(){selFile=null;document.getElementById('fileIn').value='';renderPreview();}

/* --- Process --- */
function doRun(){
  if(!selFile)return;
  var btn=document.getElementById('runBtn');
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Analyzing...';
  document.getElementById('resultsArea').style.display='none';
  showSteps();
  runAsync().catch(function(e){
    document.getElementById('stepsArea').style.display='none';
    document.getElementById('resultsArea').style.display='block';
    document.getElementById('resultsArea').innerHTML='<div style="background:#fef2f2;border:1px solid #fecaca;border-radius:14px;padding:20px;color:#b91c1c;font-size:14px;margin-top:24px">'+esc(e.message)+'</div>';
  }).finally(function(){btn.disabled=false;btn.innerHTML='&#x26A1; Analyze my bill';});
}

async function runAsync(){
  setStep(1,'active');
  var fd=new FormData();
  fd.append('file',selFile);
  var r=await fetch('/electricity/analyze',{method:'POST',body:fd});
  if(!r.ok){var e=await r.json();throw new Error(e.detail||r.statusText);}
  setStep(1,'done');
  setStep(2,'active');
  var data=await r.json();
  var parsed=JSON.parse(data.result);
  billData=parsed.bill;
  savingsData=parsed.savings;
  setStep(2,'done');
  setStep(3,'active');
  await new Promise(function(ok){setTimeout(ok,500);});
  setStep(3,'done');
  document.getElementById('stepsArea').style.display='none';
  renderResults();
}

function showSteps(){
  var h='<div class="steps-card">';
  h+='<div class="steps-title">Analyzing your bill</div>';
  h+='<div class="step-row waiting" id="s1"><span class="step-icon">&#x1F4D6;</span> Reading electricity bill...</div>';
  h+='<div class="step-row waiting" id="s2"><span class="step-icon">&#x1F9E0;</span> Extracting consumption data...</div>';
  h+='<div class="step-row waiting" id="s3"><span class="step-icon">&#x1F4B0;</span> Calculating savings...</div>';
  h+='</div>';
  document.getElementById('stepsArea').innerHTML=h;
  document.getElementById('stepsArea').style.display='block';
}
function setStep(n,s){
  var el=document.getElementById('s'+n);if(!el)return;
  el.className='step-row '+s;
  if(s==='active')el.querySelector('.step-icon').innerHTML='<span class="spinner"></span>';
  if(s==='done')el.querySelector('.step-icon').innerHTML='&#x2705;';
}

/* --- Render Results --- */
function renderResults(){
  var b=billData||{};
  var s=savingsData||{};
  var h='<div class="results" style="animation:tileIn .4s ease">';

  // Title
  h+='<div class="doc-title">&#x26A1; Bill Analysis</div>';

  // Current bill hero
  h+='<div class="bill-hero">';
  h+='<div class="savings-label">Your monthly cost</div>';
  h+='<div class="savings-value">&#x20AA; '+fmt(s.current_bill?.monthly_cost||0)+'</div>';
  h+='<div class="savings-sub">'+fmt(s.current_bill?.monthly_kwh||0)+' kWh/month &middot; '+(s.current_bill?.tariff_type==='flat'?'Flat tariff':'Taoz tariff')+'</div>';
  h+='</div>';

  // Savings hero
  if(s.total_monthly_saving>0){
    h+='<div class="savings-hero" onclick="showSavingsDetail()">';
    h+='<div class="savings-label">You can save</div>';
    h+='<div class="savings-value">&#x20AA; '+fmt(s.total_monthly_saving)+' / month</div>';
    h+='<div class="savings-sub">&#x20AA; '+fmt(s.total_annual_saving)+' per year &middot; '+s.saving_percentage+'% reduction</div>';
    h+='</div>';
  }

  // Bill details card
  h+='<div class="section-label">Bill Details</div>';
  h+='<div class="bill-card">';
  if(b.recipient) h+=billRow('Customer',b.recipient);
  if(b.period) h+=billRow('Period',b.period);
  if(b.consumption_kwh) h+=billRow('Consumption',fmt(b.consumption_kwh)+' kWh');
  if(b.rate_per_kwh) h+=billRow('Rate',b.rate_per_kwh+' ag/kWh');
  if(b.tariff_type) h+=billRow('Tariff',b.tariff_type==='flat'?'Flat (&#1488;&#1495;&#1497;&#1491;)':'Taoz (&#1514;&#1506;"&#1494;)');
  if(b.kva) h+=billRow('Connection',b.kva+' KVA'+(b.connection_type==='three'?' (3-phase)':' (1-phase)'));
  if(b.sender) h+=billRow('Supplier',b.sender);
  if(b.meter_number) h+=billRow('Meter',b.meter_number);
  h+='</div>';

  // Savings recommendations
  if(s.savings&&s.savings.length){
    h+='<div class="section-label">Savings Recommendations</div>';
    var icons={'supplier_switch':'&#x1F504;','taoz_switch':'&#x23F0;','smart_scheduling':'&#x1F4A7;','ac_optimization':'&#x2744;&#xFE0F;'};
    s.savings.forEach(function(item,i){
      var icon=icons[item.type]||'&#x1F4B0;';
      h+='<div class="saving-item" style="animation:tileIn .3s ease '+(i*0.08)+'s both" onclick="showSavingDetail('+i+')">';
      h+='<div class="saving-icon">'+icon+'</div>';
      h+='<div class="saving-text">';
      h+='<div class="saving-title">'+esc(item.title_he||item.title)+'</div>';
      h+='<div class="saving-desc">'+esc(item.description)+' <span class="effort effort-'+item.effort+'">'+esc(item.effort_he||item.effort)+'</span></div>';
      h+='</div>';
      h+='<div class="saving-amount"><div class="saving-nis">-&#x20AA;'+fmt(item.monthly_saving)+'</div><div class="saving-period">per month</div></div>';
      h+='</div>';
    });
  }

  // Optimized bill
  if(s.optimized_monthly_cost){
    h+='<div class="section-label">After Optimization</div>';
    h+='<div style="background:var(--green-light);border:1.5px solid #86efac;border-radius:var(--r);padding:24px;display:flex;justify-content:space-between;align-items:center">';
    h+='<div><div style="font-size:12px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.06em">New monthly cost</div>';
    h+='<div style="font-size:28px;font-weight:900;color:var(--green)">&#x20AA; '+fmt(s.optimized_monthly_cost)+'</div></div>';
    h+='<div style="text-align:left"><div style="font-size:12px;color:var(--text3)">vs. current</div>';
    h+='<div style="font-size:20px;font-weight:800;color:var(--red);text-decoration:line-through">&#x20AA; '+fmt(s.current_bill?.monthly_cost||0)+'</div></div>';
    h+='</div>';
  }

  // Solar card
  if(s.solar){
    h+='<div class="solar-card" onclick="showSolar()">';
    h+='<div style="font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;opacity:.75;margin-bottom:8px">&#x2600;&#xFE0F; Solar Panels</div>';
    h+='<div style="font-size:24px;font-weight:900">Save &#x20AA;'+fmt(s.solar.monthly_saving)+'/month</div>';
    h+='<div style="font-size:14px;opacity:.8;margin-top:4px">ROI in '+s.solar.payback_years+' years &middot; Tap for details</div>';
    h+='</div>';
  }

  h+='<button class="reset-btn" onclick="doReset()">&#x1F4F8; Scan another bill</button>';
  h+='</div>';

  document.getElementById('resultsArea').innerHTML=h;
  document.getElementById('resultsArea').style.display='block';
  document.getElementById('uploadArea').style.display='none';
}

function billRow(label,value){
  return '<div class="bill-row"><span class="bill-label">'+label+'</span><span class="bill-value">'+value+'</span></div>';
}

/* --- Modals --- */
function showSavingsDetail(){
  var s=savingsData||{};
  var h='<div style="font-size:32px;font-weight:900;color:var(--green);margin-bottom:8px">&#x20AA; '+fmt(s.total_annual_saving)+' / year</div>';
  h+='<div style="color:var(--text2);margin-bottom:20px">That\'s &#x20AA;'+fmt(s.total_monthly_saving)+' every month back in your pocket.</div>';
  if(s.savings){
    s.savings.forEach(function(item){
      h+='<div class="detail-row"><div class="detail-key">'+esc(item.title_he||item.title)+'</div><div class="detail-val" style="color:var(--green);font-weight:700">-&#x20AA;'+fmt(item.monthly_saving)+'/mo</div></div>';
    });
  }
  openModal('Total Savings',h);
}

function showSavingDetail(idx){
  var s=savingsData||{};
  var item=s.savings[idx];if(!item)return;
  var h='<div style="font-size:28px;font-weight:900;color:var(--green);margin-bottom:4px">-&#x20AA;'+fmt(item.monthly_saving)+' / month</div>';
  h+='<div style="color:var(--text2);margin-bottom:20px">=&#x20AA;'+fmt(item.annual_saving)+' per year</div>';
  h+='<div class="detail-row"><div class="detail-key">How</div><div class="detail-val">'+esc(item.description)+'</div></div>';
  h+='<div class="detail-row"><div class="detail-key">Effort</div><div class="detail-val"><span class="effort effort-'+item.effort+'">'+esc(item.effort_he||item.effort)+'</span></div></div>';
  if(item.device){
    h+='<div class="detail-row"><div class="detail-key">Device</div><div class="detail-val">'+esc(item.device)+' (~&#x20AA;'+item.device_cost+')</div></div>';
    var payback=item.device_cost/item.monthly_saving;
    h+='<div class="detail-row"><div class="detail-key">Payback</div><div class="detail-val">'+payback.toFixed(1)+' months</div></div>';
  }
  openModal(item.title_he||item.title,h);
}

function showSolar(){
  var s=savingsData?.solar;if(!s)return;
  var h='<div style="font-size:28px;font-weight:900;color:var(--blue);margin-bottom:16px">&#x2600;&#xFE0F; Solar Panel Estimate</div>';
  h+='<div class="detail-row"><div class="detail-key">Monthly saving</div><div class="detail-val" style="font-weight:700;color:var(--green)">&#x20AA;'+fmt(s.monthly_saving)+'</div></div>';
  h+='<div class="detail-row"><div class="detail-key">Annual saving</div><div class="detail-val" style="font-weight:700;color:var(--green)">&#x20AA;'+fmt(s.annual_saving)+'</div></div>';
  h+='<div class="detail-row"><div class="detail-key">Est. installation</div><div class="detail-val">~&#x20AA;'+fmt(s.estimated_cost)+'</div></div>';
  h+='<div class="detail-row"><div class="detail-key">Payback period</div><div class="detail-val">'+s.payback_years+' years</div></div>';
  openModal('Solar Panels',h);
}

function openModal(title,bodyHtml){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalBody').innerHTML=bodyHtml;
  document.getElementById('modalOverlay').style.display='flex';
}
function closeModal(e){
  if(!e||e.target===document.getElementById('modalOverlay'))
    document.getElementById('modalOverlay').style.display='none';
}

/* --- Utils --- */
function fmt(n){return Math.round(Number(n)||0).toLocaleString();}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function doReset(){
  selFile=null;billData=null;savingsData=null;
  document.getElementById('fileIn').value='';
  document.getElementById('filePreview').innerHTML='';
  document.getElementById('runBtn').disabled=true;
  document.getElementById('runBtn').innerHTML='&#x26A1; Analyze my bill';
  document.getElementById('resultsArea').style.display='none';
  document.getElementById('resultsArea').innerHTML='';
  document.getElementById('uploadArea').style.display='block';
}
if('serviceWorker' in navigator){navigator.serviceWorker.register('/static/sw.js');}
</script>
